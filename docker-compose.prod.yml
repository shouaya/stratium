services:
  redis:
    image: redis:7-alpine
    container_name: stratium-redis
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: stratium-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stratium}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-stratium}"]
      interval: 5s
      timeout: 5s
      retries: 10

  job-runner:
    build:
      context: .
      dockerfile: apps/job-runner/Dockerfile
    container_name: stratium-job-runner
    restart: unless-stopped
    working_dir: /workspace
    command: sh -lc "pnpm --filter @stratium/job-runner build && pnpm --filter @stratium/job-runner start"
    environment:
      NODE_ENV: production
      JOB_RUNNER_PORT: 4300
      JOB_RUNNER_HOST: 0.0.0.0
      JOB_RUNNER_TOKEN: ${JOB_RUNNER_TOKEN:-stratium-local-runner}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JOB_RUNNER_COMPOSE_COMMAND: docker
      JOB_RUNNER_COMPOSE_ARGS: compose
      JOB_RUNNER_WORKDIR: /workspace
      JOB_RUNNER_BATCH_ENV_FILE: .env
      JOB_RUNNER_BATCH_COMPOSE_FILE: docker-compose.batch.yml
      JOB_RUNNER_MAIN_COMPOSE_FILE: docker-compose.prod.yml
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - job-runner-node_modules:/workspace/node_modules
      - batch-app-node_modules:/workspace/apps/batch/node_modules
      - job-runner-app-node_modules:/workspace/apps/job-runner/node_modules
      - shared-node_modules:/workspace/packages/shared/node_modules
      - trading-core-node_modules:/workspace/packages/trading-core/node_modules
    depends_on:
      - redis

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: stratium-api
    restart: unless-stopped
    working_dir: /workspace
    command: sh -lc "pnpm exec prisma generate && pnpm --filter @stratium/shared build && pnpm --filter @stratium/trading-core build && pnpm --filter @stratium/api build && pnpm --filter @stratium/api start"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/stratium?schema=public}
      JOB_RUNNER_BASE_URL: ${JOB_RUNNER_BASE_URL:-http://job-runner:4300}
      JOB_RUNNER_TOKEN: ${JOB_RUNNER_TOKEN:-stratium-local-runner}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: 4000
    ports:
      - "${API_PORT:-4000}:4000"
    volumes:
      - .:/workspace
      - api-node_modules:/workspace/node_modules
      - api-app-node_modules:/workspace/apps/api/node_modules
      - shared-node_modules:/workspace/packages/shared/node_modules
      - trading-core-node_modules:/workspace/packages/trading-core/node_modules
    depends_on:
      - db
      - job-runner
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: stratium-web
    restart: unless-stopped
    working_dir: /workspace
    command: sh -lc "pnpm --filter @stratium/web build && pnpm --filter @stratium/web start"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - .:/workspace
      - web-node_modules:/workspace/node_modules
      - web-app-node_modules:/workspace/apps/web/node_modules
      - shared-node_modules:/workspace/packages/shared/node_modules
    depends_on:
      - api

  trader-mcp:
    build:
      context: .
      dockerfile: apps/trader-mcp/Dockerfile
    container_name: stratium-trader-mcp
    restart: unless-stopped
    working_dir: /workspace
    command: sh -lc "pnpm --filter @stratium/trader-mcp build && pnpm --filter @stratium/trader-mcp start"
    environment:
      NODE_ENV: production
      STRATIUM_API_BASE_URL: ${STRATIUM_MCP_API_BASE_URL:-http://api:4000}
      STRATIUM_MCP_HOST: 0.0.0.0
      STRATIUM_MCP_PORT: 4600
      STRATIUM_MCP_PATH: /mcp
      STRATIUM_MCP_CORS_ORIGIN: ${STRATIUM_MCP_CORS_ORIGIN:-*}
    ports:
      - "${TRADER_MCP_PORT:-4600}:4600"
    volumes:
      - .:/workspace
      - trader-mcp-node_modules:/workspace/node_modules
      - trader-mcp-app-node_modules:/workspace/apps/trader-mcp/node_modules
      - shared-node_modules:/workspace/packages/shared/node_modules
      - trading-core-node_modules:/workspace/packages/trading-core/node_modules
    depends_on:
      - api

volumes:
  postgres-data:
  api-node_modules:
  web-node_modules:
  api-app-node_modules:
  web-app-node_modules:
  batch-app-node_modules:
  job-runner-app-node_modules:
  job-runner-node_modules:
  trader-mcp-node_modules:
  trader-mcp-app-node_modules:
  shared-node_modules:
  trading-core-node_modules:
