services:
  db:
    image: postgres:16-alpine
    container_name: stratium-db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stratium}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-stratium}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: stratium-api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    working_dir: /workspace
    command: sh -lc "pnpm exec prisma db push --skip-generate && pnpm --filter @stratium/api dev"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/stratium?schema=public}
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - .:/workspace
      - api-node_modules:/workspace/node_modules
      - api-app-node_modules:/workspace/apps/api/node_modules
      - web-app-node_modules:/workspace/apps/web/node_modules
      - shared-node_modules:/workspace/packages/shared/node_modules
      - trading-core-node_modules:/workspace/packages/trading-core/node_modules
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: stratium-web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    working_dir: /workspace
    command: sh -lc "pnpm --filter @stratium/web dev"
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - web-node_modules:/workspace/node_modules
      - api-app-node_modules:/workspace/apps/api/node_modules
      - web-app-node_modules:/workspace/apps/web/node_modules
      - shared-node_modules:/workspace/packages/shared/node_modules
      - trading-core-node_modules:/workspace/packages/trading-core/node_modules
    depends_on:
      - api

  adminer:
    image: adminer:4-standalone
    container_name: stratium-adminer
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres-data:
  api-node_modules:
  web-node_modules:
  api-app-node_modules:
  web-app-node_modules:
  shared-node_modules:
  trading-core-node_modules:
