services:
  redis:
    image: redis:7-alpine
    container_name: stratium-redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  db:
    image: postgres:16-alpine
    container_name: stratium-db
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stratium}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-stratium}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: stratium-api
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    working_dir: /workspace
    command: sh -lc "pnpm exec prisma generate && pnpm --filter @stratium/api dev"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/stratium?schema=public}
      JOB_RUNNER_BASE_URL: ${JOB_RUNNER_BASE_URL:-http://job-runner:4300}
      JOB_RUNNER_TOKEN: ${JOB_RUNNER_TOKEN:-stratium-local-runner}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: 4000
    ports:
      - "${API_HOST_PORT:-6100}:4000"
    volumes:
      - .:/workspace
      - api-node_modules:/workspace/node_modules
      - api-app-node_modules:/workspace/apps/api/node_modules
      - web-app-node_modules:/workspace/apps/web/node_modules
      - shared-node_modules:/workspace/packages/shared/node_modules
      - trading-core-node_modules:/workspace/packages/trading-core/node_modules
    depends_on:
      - db
      - job-runner
      - redis

  job-runner:
    build:
      context: .
      dockerfile: apps/job-runner/Dockerfile
    container_name: stratium-job-runner
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    working_dir: /workspace
    command: sh -lc "pnpm --filter @stratium/job-runner dev"
    environment:
      JOB_RUNNER_PORT: 4300
      JOB_RUNNER_HOST: 0.0.0.0
      JOB_RUNNER_TOKEN: ${JOB_RUNNER_TOKEN:-stratium-local-runner}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JOB_RUNNER_WORKDIR: /workspace
      JOB_RUNNER_BATCH_ENV_FILE: .env
      JOB_RUNNER_BATCH_COMPOSE_FILE: docker-compose.batch.yml
      JOB_RUNNER_MAIN_COMPOSE_FILE: docker-compose.yml
    ports:
      - "${JOB_RUNNER_HOST_PORT:-4300}:4300"
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
      - api-node_modules:/workspace/node_modules
      - api-app-node_modules:/workspace/apps/api/node_modules
      - web-app-node_modules:/workspace/apps/web/node_modules
      - shared-node_modules:/workspace/packages/shared/node_modules
      - trading-core-node_modules:/workspace/packages/trading-core/node_modules
      - batch-app-node_modules:/workspace/apps/batch/node_modules
      - job-runner-app-node_modules:/workspace/apps/job-runner/node_modules
    depends_on:
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: stratium-web
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    working_dir: /workspace
    command: sh -lc "rm -rf apps/web/.next-dev && pnpm --filter @stratium/web dev"
    environment:
      NEXT_DIST_DIR: .next-dev
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:6100}
    ports:
      - "${WEB_HOST_PORT:-5000}:3000"
    volumes:
      - .:/workspace
      - web-node_modules:/workspace/node_modules
      - api-app-node_modules:/workspace/apps/api/node_modules
      - web-app-node_modules:/workspace/apps/web/node_modules
      - shared-node_modules:/workspace/packages/shared/node_modules
      - trading-core-node_modules:/workspace/packages/trading-core/node_modules
    depends_on:
      - api

  trader-mcp:
    build:
      context: .
      dockerfile: apps/trader-mcp/Dockerfile
    container_name: stratium-trader-mcp
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    working_dir: /workspace
    command: sh -lc "pnpm --filter @stratium/trader-mcp dev"
    environment:
      STRATIUM_API_BASE_URL: ${STRATIUM_API_BASE_URL:-http://api:4000}
      STRATIUM_MCP_HOST: 0.0.0.0
      STRATIUM_MCP_PORT: 4600
      STRATIUM_MCP_PATH: /mcp
      STRATIUM_MCP_CORS_ORIGIN: ${STRATIUM_MCP_CORS_ORIGIN:-*}
      STRATIUM_MCP_DEBUG_LOG_PATH: ${STRATIUM_MCP_DEBUG_LOG_PATH:-logs/trader-mcp-http.ndjson}
    ports:
      - "${TRADER_MCP_HOST_PORT:-4600}:4600"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4600/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - .:/workspace
      - trader-mcp-node_modules:/workspace/node_modules
      - trader-mcp-app-node_modules:/workspace/apps/trader-mcp/node_modules
      - shared-node_modules:/workspace/packages/shared/node_modules
      - trading-core-node_modules:/workspace/packages/trading-core/node_modules
    depends_on:
      - api

  adminer:
    image: adminer:4-standalone
    container_name: stratium-adminer
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${ADMINER_HOST_PORT:-18080}:8080"
    depends_on:
      - db

volumes:
  postgres-data:
  api-node_modules:
  web-node_modules:
  api-app-node_modules:
  web-app-node_modules:
  batch-app-node_modules:
  job-runner-app-node_modules:
  trader-mcp-node_modules:
  trader-mcp-app-node_modules:
  shared-node_modules:
  trading-core-node_modules:
