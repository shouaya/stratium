services:
  batch:
    build:
      context: .
      dockerfile: apps/batch/Dockerfile
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      HYPERLIQUID_COINS: ${HYPERLIQUID_COINS:-BTC}
      HYPERLIQUID_CANDLE_INTERVAL: ${HYPERLIQUID_CANDLE_INTERVAL:-1m}
    networks:
      - stratium
    command: ["sh", "-lc", "echo 'Specify a batch job command with docker compose run.' && exit 1"]

networks:
  stratium:
    external: true
    name: ${BATCH_DOCKER_NETWORK:-stratium_default}
